# Publish SuperSmashTexty to itch.io (https://krool.itch.io/supersmashtexty) via butler.
#
# Mirrors itch on every deploy: runs on push to main plus manual dispatch. Gated on the
# BUTLER_API_KEY secret, so if it is removed the job no-ops and can NEVER publish. Builds with a
# RELATIVE asset base (--base=./) because itch serves the game from an iframe CDN path; the vite
# base is unset (defaults to '/', absolute) and would 404 every asset on itch. --if-changed skips
# the push when the build is byte-identical to the current itch build. fetch-depth: 0 so
# vite.config.js's git-commit-count version (__APP_VERSION__) matches the real commit count.
name: Publish to itch.io

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  itch:
    runs-on: ubuntu-latest
    env:
      # Boolean gate only. The actual key is scoped to the butler step below so
      # npm postinstall scripts and build plugins never see it in their env.
      HAS_BUTLER: ${{ secrets.BUTLER_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - if: env.HAS_BUTLER != 'true'
        run: echo "::notice::BUTLER_API_KEY not set — itch publish skipped. Add the secret to enable."
      - uses: actions/setup-node@v5
        if: env.HAS_BUTLER == 'true'
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - if: env.HAS_BUTLER == 'true'
        run: npm ci
      - name: Build with relative base (itch serves from an iframe CDN path)
        if: env.HAS_BUTLER == 'true'
        run: npm run build -- --base=./
      - name: Push to itch.io (butler pinned + hash-verified)
        if: env.HAS_BUTLER == 'true'
        env:
          # The only step that gets the credential.
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          # Pinned + verified: butler runs with BUTLER_API_KEY in env, so an
          # unpinned LATEST download is a supply-chain injection point. To bump:
          # download the new zip, sha256sum it, update both values.
          BUTLER_VERSION: "15.21.0"
          BUTLER_SHA256: "b640fceade5cafc7601b0ee57ba13c85913917eb5440375f7a605126f9ca2e1c"
        run: |
          curl -sL -o butler.zip "https://broth.itch.zone/butler/linux-amd64/${BUTLER_VERSION}/archive/default"
          echo "${BUTLER_SHA256}  butler.zip" | sha256sum -c -
          unzip -q butler.zip
          chmod +x butler
          ./butler push dist krool/supersmashtexty:html5 --userversion "$(git rev-list --count HEAD)" --if-changed
